<title>SmartLootHub</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f0f0f;
  color:white;
}

.header{
  text-align:center;
  padding:30px 20px;
}

.header h1{
  color:gold;
  margin:10px 0;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* CARD */
.card{
  background:#1a1a1a;
  border-radius:15px;
  margin:20px 0;
  padding:20px;
  text-align:center;
  box-shadow:0 0 15px rgba(255,215,0,0.2);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
}

/* IMAGE */
.card img{
  width:100%;
  max-width:220px;
  border-radius:12px;
  margin-bottom:15px;
}

/* TEXT */
.title{
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
}

.price{
  color:gold;
  margin:5px 0 10px;
}

/* BUTTON */
.btn{
  display:inline-block;
  background:gold;
  color:black;
  padding:8px 16px;
  border-radius:20px;
  text-decoration:none;
  font-size:14px;
  margin-bottom:10px;
  transition:0.3s;
}

.btn:hover{
  background:white;
}

</style>
</head>
